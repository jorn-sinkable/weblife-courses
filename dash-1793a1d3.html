const b64d = (s) => Uint8Array.from(atob(s), c => c.charCodeAt(0));
document.getElementById('f').addEventListener('submit', async (e) => {
  e.preventDefault();
  const err = document.getElementById('err');
  err.textContent = '';
  const pw = document.getElementById('pw').value;
  try {
    const baseKey = await crypto.subtle.importKey('raw', new TextEncoder().encode(pw), 'PBKDF2', false, ['deriveKey']);
    const key = await crypto.subtle.deriveKey(
      { name:'PBKDF2', salt: b64d(DATA.salt), iterations: DATA.iter, hash:'SHA-256' },
      baseKey, { name:'AES-GCM', length:256 }, false, ['decrypt']
    );
    const pt = await crypto.subtle.decrypt({ name:'AES-GCM', iv: b64d(DATA.iv) }, key, b64d(DATA.ct));
    const html = new TextDecoder().decode(pt);
    const doc = document.getElementById('doc');
    doc.innerHTML = html;
    document.getElementById('gate').remove();
    doc.style.display = 'block';
    document.title = 'Protected document';
  } catch (_) {
    err.textContent = 'Incorrect password.';
  }
});
