<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebLife Onboarding - Course Catalog</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e8ecf1 100%);
            color: #1a1a1a;
            line-height: 1.6;
            padding: 40px 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            padding: 40px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px;
            color: white;
            box-shadow: 0 10px 40px rgba(102, 126, 234, 0.3);
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.95;
        }

        .search-bar {
            margin-bottom: 30px;
        }

        .search-bar input {
            width: 100%;
            padding: 16px 20px;
            border: 2px solid #e8ecf1;
            border-radius: 12px;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
        }

        .search-bar input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        .course-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .course-item {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            transition: all 0.3s ease;
        }

        .course-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.12);
        }

        .course-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            gap: 16px;
        }

        .course-name {
            font-size: 1.25rem;
            font-weight: 600;
            color: #1a1a1a;
            flex: 1;
        }

        .course-name a {
            color: #667eea;
            text-decoration: none;
            transition: color 0.2s ease;
        }

        .course-name a:hover {
            color: #764ba2;
            text-decoration: underline;
        }

        .course-duration {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            white-space: nowrap;
        }

        .course-description {
            color: #4b5563;
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .loading {
            text-align: center;
            padding: 60px 20px;
            font-size: 1.2rem;
            color: #667eea;
        }

        .error {
            text-align: center;
            padding: 60px 20px;
            color: #dc2626;
            background: #fee2e2;
            border-radius: 12px;
            margin: 20px 0;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 2rem;
            }

            .course-header {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>WebLife Onboarding</h1>
            <p>Course Catalog</p>
        </div>

        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="Search courses...">
        </div>

        <div id="courseContainer">
            <div class="loading">Loading courses...</div>
        </div>
    </div>

    <script>
        const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTqmWEO0XTrTgyyhDDqUIIKAeInH_HpRkq1f8kFxSeWDaCZIe6GpF9dLZKzrAtusqzgSxeblBm3I8Y5/pub?output=csv';

        let allCourses = [];

        async function loadCourses() {
            try {
                const response = await fetch(SHEET_URL);
                const csvText = await response.text();

                const lines = csvText.trim().split('\n');
                const headers = lines[0].split(',');

                allCourses = [];

                for (let i = 1; i < lines.length; i++) {
                    const line = lines[i].trim();
                    if (!line) continue;

                    const values = parseCSVLine(line);
                    if (values.length < 6) continue;

                    const courseName = values[0]?.replace(/"/g, '').trim();
                    const duration = values[1]?.replace(/"/g, '').trim();
                    const description = values[5]?.replace(/"/g, '').trim();
                    const link = values[6]?.replace(/"/g, '').trim();

                    if (courseName && courseName !== 'Course Name') {
                        allCourses.push({
                            name: courseName,
                            duration: duration || 'TBD',
                            description: description || 'Course description coming soon.',
                            link: link || ''
                        });
                    }
                }

                renderCourses();

            } catch (error) {
                console.error('Error loading courses:', error);
                document.getElementById('courseContainer').innerHTML =
                    '<div class="error">Failed to load courses. Please check the Google Sheet URL.</div>';
            }
        }

        function parseCSVLine(line) {
            const result = [];
            let current = '';
            let inQuotes = false;

            for (let i = 0; i < line.length; i++) {
                const char = line[i];

                if (char === '"') {
                    inQuotes = !inQuotes;
                } else if (char === ',' && !inQuotes) {
                    result.push(current);
                    current = '';
                } else {
                    current += char;
                }
            }
            result.push(current);

            return result;
        }

        function renderCourses() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();

            let filteredCourses = allCourses.filter(course => {
                return course.name.toLowerCase().includes(searchTerm) ||
                       course.description.toLowerCase().includes(searchTerm);
            });

            const container = document.getElementById('courseContainer');

            if (filteredCourses.length === 0) {
                container.innerHTML = '<div class="loading">No courses found</div>';
                return;
            }

            const html = '<div class="course-list">' +
                filteredCourses.map(course => `
                    <div class="course-item">
                        <div class="course-header">
                            <div class="course-name">${course.link ? `<a href="${course.link}" target="_blank">${course.name}</a>` : course.name}</div>
                            <div class="course-duration">${course.duration}</div>
                        </div>
                        <div class="course-description">${course.description}</div>
                    </div>
                `).join('') +
                '</div>';

            container.innerHTML = html;
        }

        document.getElementById('searchInput').addEventListener('input', renderCourses);

        loadCourses();
    </script>
</body>
</html>
